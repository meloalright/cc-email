name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cc-email-${{ matrix.target }}.tar.gz cc-email
          cd ../../..

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} cc-email-${{ matrix.target }}.tar.gz --clobber

  homebrew:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for assets
        run: sleep 5

      - name: Download release assets and compute SHA256
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_NUM="${VERSION#v}"

          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            gh release download "$VERSION" \
              --repo meloalright/cc-email \
              --pattern "cc-email-${target}.tar.gz"
            SHA=$(sha256sum "cc-email-${target}.tar.gz" | cut -d' ' -f1)
            echo "SHA_${target//-/_}=$SHA" >> "$GITHUB_ENV"
          done

          echo "VERSION_NUM=$VERSION_NUM" >> "$GITHUB_ENV"
          echo "VERSION_TAG=$VERSION" >> "$GITHUB_ENV"

      - name: Generate formula
        run: |
          cat > cc-email.rb << FORMULA
          class CcEmail < Formula
            desc "A local-first email listener for coding agents"
            homepage "https://github.com/meloalright/cc-email"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/meloalright/cc-email/releases/download/${VERSION_TAG}/cc-email-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_aarch64_apple_darwin}"
              else
                url "https://github.com/meloalright/cc-email/releases/download/${VERSION_TAG}/cc-email-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_x86_64_apple_darwin}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/meloalright/cc-email/releases/download/${VERSION_TAG}/cc-email-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_aarch64_unknown_linux_gnu}"
              else
                url "https://github.com/meloalright/cc-email/releases/download/${VERSION_TAG}/cc-email-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_x86_64_unknown_linux_gnu}"
              end
            end

            def install
              bin.install "cc-email"
            end

            test do
              assert_match "cc-email", shell_output("#{bin}/cc-email --version")
            end
          end
          FORMULA
          echo "=== cc-email.rb ==="
          cat cc-email.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/meloalright/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp cc-email.rb tap/Formula/cc-email.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cc-email.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update cc-email to $VERSION_NUM"
          git push

  npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Wait for release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          for i in $(seq 1 30); do
            ASSETS=$(gh release view "$VERSION" --repo ${{ github.repository }} --json assets -q '.assets | length')
            if [ "$ASSETS" -ge 4 ]; then
              echo "All 4 assets available"
              break
            fi
            echo "Found $ASSETS assets, waiting... ($i/30)"
            sleep 10
          done

      - name: Update version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_NUM="${VERSION#v}"
          cd npm/cc-email
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION_NUM}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cat package.json

      - name: Publish cc-email
        working-directory: npm/cc-email
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
