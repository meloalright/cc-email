# cc-email config for Gmail
# 1. Enable IMAP in Gmail settings
# 2. Create an App Password: https://myaccount.google.com/apppasswords
# 3. Export it: export CC_EMAIL_GMAIL_PASSWORD="xxxx xxxx xxxx xxxx"
# 4. Run: cc-email listen --config cc-email-gmail.toml

[inbox]
type = "imap"
host = "imap.gmail.com"
port = 993
username = "your-account@gmail.com"
password_env = "CC_EMAIL_GMAIL_PASSWORD"
folder = "INBOX"
poll_interval_seconds = 15
# search_from = ["sender@example.com"]    # optional: only process emails from these senders

[outbox]
type = "smtp"
host = "smtp.gmail.com"
port = 587
username = "your-account@gmail.com"
password_env = "CC_EMAIL_GMAIL_PASSWORD"
from = "your-account@gmail.com"

[agent]
type = "claude-code"
command = "claude"
timeout_seconds = 600
permission_mode = "email"               # email | auto | deny_all | allow_all
permission_timeout_seconds = 300
permission_default = "deny"             # deny | allow — fallback on timeout

[security]
allowed_senders = ["your-email@example.com"]
max_body_bytes = 20000
max_attachment_bytes = 5000000
